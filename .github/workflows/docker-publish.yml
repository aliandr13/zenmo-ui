# Build and push UI (nginx) image to GHCR on merge to main (linux/amd64 + linux/arm64).
# Image: ghcr.io/<owner>/zenmo-ui
#
# Set repository variable VITE_API_URL (Settings → Secrets and variables → Actions → Variables):
#   - `relative` if nginx in this image proxies /api to the backend on the same host:port
#   - or an absolute API base (e.g. https://api.example.com) for split-host deployments
# If unset, http://localhost:8080 is used (CI smoke tests only).

name: Publish Docker image

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write
  actions: write # BuildKit GHA cache (cache-to type=gha)

concurrency:
  group: docker-publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image owner
        run: echo "OWNER_LC=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Resolve VITE_API_URL
        id: vite
        run: |
          URL="${{ vars.VITE_API_URL }}"
          if [ -z "$URL" ]; then URL="http://localhost:8080"; fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          # GITHUB_ENV: build-push-action + Docker cache key more reliable than outputs alone
          echo "VITE_API_URL=$URL" >> "$GITHUB_ENV"
          echo "Resolved VITE_API_URL for this run: $URL"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            VITE_API_URL=${{ env.VITE_API_URL }}
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/zenmo-ui:${{ github.sha }}
            ghcr.io/${{ env.OWNER_LC }}/zenmo-ui:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
